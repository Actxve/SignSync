<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignSync — Accessible Video Chat</title>
  <meta name="description" content="Two-way accessible video chat for deaf and hearing users with live captions." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Auth Screen ── -->
  <div id="screen-auth" class="screen active">
    <div class="auth-card">
      <h1 class="logo">Sign<span>Sync</span></h1>
      <p class="tagline">Accessible video chat for everyone</p>

      <div class="tab-row">
        <button id="tab-login" class="tab active" onclick="switchTab('login')">Login</button>
        <button id="tab-register" class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login -->
      <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
        <input id="login-email" type="email" placeholder="Email" required autocomplete="email" />
        <input id="login-password" type="password" placeholder="Password" required autocomplete="current-password" />
        <button type="submit" class="btn-primary">Login</button>
        <p id="login-error" class="error-msg"></p>
      </form>

      <!-- Register -->
      <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
        <input id="reg-username" type="text" placeholder="Username" required autocomplete="username" />
        <input id="reg-email" type="email" placeholder="Email" required autocomplete="email" />
        <input id="reg-password" type="password" placeholder="Password (min 6 chars)" minlength="6" required autocomplete="new-password" />
        <button type="submit" class="btn-primary">Create Account</button>
        <p id="reg-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <!-- ── Lobby Screen ── -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-card">
      <div class="lobby-header">
        <h2>Welcome, <span id="lobby-username"></span></h2>
        <button onclick="handleLogout()" class="btn-ghost">Logout</button>
      </div>

      <div class="lobby-actions">
        <button id="btn-create" class="btn-primary big" onclick="createRoom()">➕ Create Meeting</button>

        <div class="divider">or</div>

        <div class="join-row">
          <input id="join-code-input" type="text" placeholder="Enter 6-letter code" maxlength="6"
                 oninput="this.value = this.value.toUpperCase()" autocomplete="off" />
          <button class="btn-primary" onclick="joinRoom()">Join</button>
        </div>
        <p id="lobby-error" class="error-msg"></p>
      </div>
    </div>
  </div>

  <!-- ── Call Screen ── -->
  <div id="screen-call" class="screen">
    <header class="call-header">
      <span class="logo small">Sign<span>Sync</span></span>
      <span id="call-code-display" class="room-code-badge"></span>
      <button onclick="leaveCall()" class="btn-danger">Leave</button>
    </header>

    <div class="video-grid">
      <div class="video-box">
        <video id="local-video" autoplay muted playsinline></video>
        <span class="video-label">You</span>
      </div>
      <div class="video-box">
        <video id="remote-video" autoplay playsinline></video>
        <span class="video-label" id="remote-label">Waiting for peer…</span>
      </div>
    </div>

    <div class="caption-area" id="caption-area">
      <p class="caption-placeholder">Captions will appear here…</p>
    </div>

    <div class="controls">
      <button id="btn-mic" class="ctrl-btn active" onclick="toggleMic()" title="Toggle Microphone">🎙 Mic</button>
      <button id="btn-cam" class="ctrl-btn active" onclick="toggleCam()" title="Toggle Camera">📷 Cam</button>
      <button id="btn-speech" class="ctrl-btn" onclick="toggleSpeech()" title="Toggle Speech-to-Text">💬 Speech</button>
      <button id="btn-tts" class="ctrl-btn" onclick="toggleTTS()" title="Toggle Text-to-Speech">🔊 TTS</button>
    </div>
  </div>

  <!-- ── Scripts ── -->
  <!-- MediaPipe Hands via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <script src="js/captions.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/signs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
